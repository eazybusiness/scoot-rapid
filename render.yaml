services:
  - type: web
    name: scoot-rapid
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        fromDatabase:
          name: scoot-rapid-db
          property: connectionString
      - key: BASE_PRICE_PER_MINUTE
        value: 0.30
      - key: START_FEE
        value: 1.50

databases:
  - name: scoot-rapid-db
    databaseName: scoot_rapid
    user: scooter_user
    plan: free
